name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required so tauri-action can upload assets and create/update the GitHub release.
# If releases still fail with "Resource not accessible by integration", set the repo default
# to read/write under Settings → Actions → General → Workflow permissions.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Cargo protoc (Windows)
        if: matrix.platform == 'windows-latest'
        run: Copy-Item -Path .cargo/config.windows.toml -Destination .cargo/config.toml -Force

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mira ${{ github.ref_name }}'
          releaseBody: |
            Mira 0.1.4 fixes release automation so Windows CI can compile Lance/Protobuf dependencies, and clarifies GitHub Actions permissions needed to publish draft releases. It builds on 0.1.3’s video support, bug fixes, and multi-platform installers.

            Highlights:
            - Windows release builds: native `protoc` shim instead of the Unix-only shell wrapper
            - Release workflow: explicit `contents: write` permissions for publishing assets
            - Video support across search and preview flows
            - Release builds for Windows and Linux
            - Linux packaging fix for Ubuntu release builds
            - Apple Silicon macOS release packaging

            **macOS users:** Mira is not yet notarized by Apple. After dragging Mira to `/Applications`, run this once in Terminal to remove the quarantine flag:

            **Intel Mac users:** Mira's release automation currently ships Apple Silicon macOS builds only because ONNX Runtime no longer provides a working Intel macOS binary path for this dependency stack. Intel Macs can still build Mira from source.

            ```bash
            xattr -cr /Applications/Mira.app
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
