name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.args == '--target aarch64-apple-darwin' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        run: bun install

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mira ${{ github.ref_name }}'
          releaseBody: |
            Mira 0.1.3 adds support for videos, includes a round of bug fixes, and now ships downloadable builds for Windows and Linux alongside macOS.

            Highlights:
            - Video support across search and preview flows
            - Bug fixes and stability improvements
            - Release builds for Windows and Linux
            - Linux packaging fix for Ubuntu release builds
            - Apple Silicon macOS release packaging

            **macOS users:** Mira is not yet notarized by Apple. After dragging Mira to `/Applications`, run this once in Terminal to remove the quarantine flag:

            **Intel Mac users:** Mira's release automation currently ships Apple Silicon macOS builds only because ONNX Runtime no longer provides a working Intel macOS binary path for this dependency stack. Intel Macs can still build Mira from source.

            ```bash
            xattr -cr /Applications/Mira.app
            ```
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
